version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ohlcv
      POSTGRES_PASSWORD: ohlcv
      POSTGRES_DB: ohlcv
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohlcv -d ohlcv"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ohlcv:ohlcv@db:5432/ohlcv
      SYNC_DATABASE_URL: postgresql://ohlcv:ohlcv@db:5432/ohlcv
      TICKS_FILE: /data/ticks.jsonl
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - ./ticks.jsonl:/data/ticks.jsonl:ro
    command: sh -c "python -m loader.load_ticks && uvicorn app.main:app --host 0.0.0.0 --port 8000"
